<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Fast and Foodrius</title>
    <link rel="stylesheet" href="./styles/styleContacto.css">
</head>

<body>

    <header id="header">
        <nav id="navbar">
            <div id="logo"><span id="logo-icon">🍔</span><span id="logo-text">Fast and Foodrius</span></div>
            <ul id="nav-links">
                <li><a href="./Index.html">Inicio</a></li>
                <li><a href="./menu.html">Menú</a></li>
                <li><a href="./nosotros.html">Nosotros</a></li>
                <li><a href="./contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="contacto">
            <h2>Contáctanos</h2>
            <div class="form-contacto">
                <form action="#">
                    <div class="form-group">
                        <label>Nombre Completo</label>
                        <input type="text" placeholder="Tu nombre...">
                    </div>
                    <div class="form-group">
                        <label>Correo Electrónico</label>
                        <input type="email" placeholder="email@ejemplo.com">
                    </div>
                    <div class="form-group">
                        <label>Mensaje</label>
                        <textarea rows="5" placeholder="¿En qué podemos ayudarte?"></textarea>
                    </div>
                    <button type="submit" class="btn-enviar">Enviar Mensaje</button>
                </form>
            </div>
        </section>
    </main>

    <footer id="footer">
        <div id="footer-bottom">
            <p>&copy; 2026 Fast and Foodrius. Puebla, México.</p>
        </div>
    </footer>

</body>

</html>
